<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Seguimiento de pedido — Martel Pinturerias</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0F172A;color:#E5E7EB;font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:#111827;border:1px solid rgba(148,163,184,.15);border-radius:16px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.card-header{background:#E30613;padding:24px 24px 20px;text-align:center}
.logo{font-size:18px;font-weight:700;letter-spacing:.06em;color:white;opacity:.9}
.brand{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.1em;text-transform:uppercase}
.card-body{padding:28px 24px}
.factura{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#94A3B8;margin-bottom:4px;letter-spacing:.05em}
.cliente{font-size:20px;font-weight:700;color:#E5E7EB;margin-bottom:24px}
/* Progress bar */
.progress{display:flex;align-items:center;margin-bottom:28px}
.step{display:flex;flex-direction:column;align-items:center;flex:1}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:2px solid rgba(148,163,184,.2);background:#1E293B;color:#94A3B8;transition:all .3s}
.step-circle.done{background:#22c55e;border-color:#22c55e;color:white}
.step-circle.active{background:#E30613;border-color:#E30613;color:white;box-shadow:0 0 12px rgba(227,6,19,.4)}
.step-label{font-size:10px;color:#94A3B8;margin-top:6px;text-align:center;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.step-label.done{color:#22c55e}
.step-label.active{color:#E30613}
.connector{flex:1;height:2px;background:rgba(148,163,184,.15);margin:0 4px;margin-bottom:20px}
.connector.done{background:#22c55e}
/* Estado badge */
.estado-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:20px}
.estado-pendiente{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.estado-descargado{background:rgba(6,182,212,.12);color:#06b6d4;border:1px solid rgba(6,182,212,.3)}
.estado-entregado{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
/* Chofer */
.chofer-box{background:#1E293B;border:1px solid rgba(148,163,184,.1);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.chofer-icon{width:36px;height:36px;background:#E30613;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.chofer-info{flex:1}
.chofer-label{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.chofer-name{font-size:14px;font-weight:700;color:#E5E7EB;margin-top:1px}
.chofer-tel{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#06b6d4;margin-top:2px}
.chofer-tel a{color:#06b6d4;text-decoration:none}
.horario{font-size:11px;color:#475569;margin-top:6px;letter-spacing:.02em}
/* Footer */
.card-footer{padding:16px 24px;border-top:1px solid rgba(148,163,184,.1);text-align:center}
.footer-logo{font-size:11px;color:#475569;letter-spacing:.08em}
/* Loading / error */
.loading{text-align:center;padding:40px;color:#94A3B8;font-size:14px}
.error{text-align:center;padding:40px;color:#f87171;font-size:14px}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">🚛 MARTEL PINTURERIAS</div>
    <div class="brand">Seguimiento de entrega</div>
  </div>
  <div class="card-body" id="content">
    <div class="loading">Buscando tu pedido...</div>
  </div>
  <div class="card-footer">
    <div class="footer-logo">MARTEL PINTURERIAS — Delivery Control</div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyzGuaJybVT8ZakfUkPiupwsgoWp813WUbDGD9iCi_RCOq7eOhiYnDAevf9vpaFu4V0/exec';

const CHOFERES_NOMBRES = {
  victor:'Víctor', cacho:'Salvador', puma:'Juan Carlos',
  guillermo:'Guillermo', gustavo:'Gustavo', rafael:'Rafael', fernando:'Fernando'
};
const CHOFERES_TEL = {
  victor:'5493874573833', cacho:'5493874485602', puma:'5493874883492',
  guillermo:'5493875852000', gustavo:'5493876857690', rafael:'5493872213018', fernando:'5493874485602'
};

const params = new URLSearchParams(location.search);
const factura = params.get('f');
const sucursal = params.get('s');

if(!factura){
  document.getElementById('content').innerHTML = '<div class="error">Link inválido — falta número de factura.</div>';
} else {
  const cb = '_seg_'+Date.now();
  const sc = document.createElement('script');
  sc.onerror = function(){ document.getElementById('content').innerHTML = '<div class="error">No se pudo conectar. Intentá de nuevo más tarde.</div>'; };
  window[cb] = function(data){
    delete window[cb]; sc.remove();
    if(!data || !data.ok){
      document.getElementById('content').innerHTML = '<div class="error">Pedido no encontrado.<br><small style="color:#64748b">Factura: '+factura+'</small></div>';
      return;
    }
    renderPedido(data);
  };
  sc.src = GAS_URL+'?'+new URLSearchParams({action:'get_seguimiento',factura:factura,sucursal:sucursal||'',callback:cb}).toString();
  document.head.appendChild(sc);
}

function renderPedido(d){
  const estado = d.remito==='descargado' ? 'descargado' : d.estado==='entregado' ? 'entregado' : 'pendiente';
  const step1 = true;
  const step2 = estado==='descargado'||estado==='entregado';
  const step3 = estado==='entregado';
  const estadoTexto = estado==='pendiente'?'⏳ En preparación':estado==='descargado'?'🚚 En camino':'✅ Entregado';
  const estadoClass = 'estado-'+estado;
  const choferNombre = d.chofer ? (CHOFERES_NOMBRES[d.chofer]||d.chofer) : null;
  const choferTel = d.chofer ? CHOFERES_TEL[d.chofer] : null;
  const choferFmt = choferTel ? choferTel.replace('549','0').replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3') : null;

  document.getElementById('content').innerHTML = `
    <div class="factura">Pedido ${d.factura||factura}</div>
    <div class="cliente">${d.nombre||'—'}</div>
    <div class="progress">
      <div class="step">
        <div class="step-circle ${step1?'done':''}">${step1?'✓':'1'}</div>
        <div class="step-label ${step1?'done':''}">Preparando</div>
      </div>
      <div class="connector ${step2?'done':''}"></div>
      <div class="step">
        <div class="step-circle ${step3?'done':step2?'active':''}">${step3?'✓':'🚚'}</div>
        <div class="step-label ${step3?'done':step2?'active':''}">En camino</div>
      </div>
      <div class="connector ${step3?'done':''}"></div>
      <div class="step">
        <div class="step-circle ${step3?'done':''}">${step3?'✓':'📦'}</div>
        <div class="step-label ${step3?'done':''}">Entregado</div>
      </div>
    </div>
    <div class="${estadoClass} estado-badge">${estadoTexto}</div>
    ${choferNombre && !step3 ? `
    <div class="chofer-box">
      <div class="chofer-icon">🚛</div>
      <div class="chofer-info">
        <div class="chofer-label">Tu repartidor</div>
        <div class="chofer-name">${choferNombre}</div>
        ${choferFmt?`<div class="chofer-tel"><a href="tel:+${choferTel}">${choferFmt}</a></div>`:''}
        <div class="horario">📞 Lun a Vie 9 a 18 hs &nbsp;·&nbsp; Sáb 8 a 13 hs</div>
      </div>
    </div>` : ''}
  `;
}
</script>
</body>
</html>
